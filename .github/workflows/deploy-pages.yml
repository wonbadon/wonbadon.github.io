name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set deployment URL
        run: |
          if [ "${{ github.repository }}" = "wonbadon/wonbadon.github.io" ]; then
            echo "VITE_SITE_URL=https://wonbadon.github.io/" >> $GITHUB_ENV
          else
            echo "VITE_SITE_URL=https://wonbadon.github.io/taiwan-labor-calculator/" >> $GITHUB_ENV
          fi

      - name: Export optional site variables
        env:
          RAW_VITE_ADS_ENABLED: ${{ vars.VITE_ADS_ENABLED }}
          RAW_VITE_ADS_DEBUG: ${{ vars.VITE_ADS_DEBUG }}
          RAW_VITE_ADS_PROVIDER: ${{ vars.VITE_ADS_PROVIDER }}
          RAW_VITE_ADSENSE_CLIENT: ${{ vars.VITE_ADSENSE_CLIENT }}
          RAW_VITE_ADSENSE_HOME_SLOT: ${{ vars.VITE_ADSENSE_HOME_SLOT }}
          RAW_VITE_ADSENSE_PAGE_SLOT: ${{ vars.VITE_ADSENSE_PAGE_SLOT }}
          RAW_VITE_ADSENSE_CONTENT_SLOT: ${{ vars.VITE_ADSENSE_CONTENT_SLOT }}
          RAW_VITE_LEAD_CTA_ENABLED: ${{ vars.VITE_LEAD_CTA_ENABLED }}
          RAW_VITE_LEAD_CTA_DEBUG: ${{ vars.VITE_LEAD_CTA_DEBUG }}
          RAW_VITE_LEAD_CTA_TITLE: ${{ vars.VITE_LEAD_CTA_TITLE }}
          RAW_VITE_LEAD_CTA_BODY: ${{ vars.VITE_LEAD_CTA_BODY }}
          RAW_VITE_LEAD_CTA_PRIMARY_LABEL: ${{ vars.VITE_LEAD_CTA_PRIMARY_LABEL }}
          RAW_VITE_LEAD_CTA_PRIMARY_URL: ${{ vars.VITE_LEAD_CTA_PRIMARY_URL }}
          RAW_VITE_LEAD_CTA_SECONDARY_LABEL: ${{ vars.VITE_LEAD_CTA_SECONDARY_LABEL }}
          RAW_VITE_LEAD_CTA_SECONDARY_URL: ${{ vars.VITE_LEAD_CTA_SECONDARY_URL }}
        run: |
          set_optional_var() {
            local key="$1"
            local value="$2"

            case "$value" in
              ''|null|undefined)
                return
                ;;
            esac

            echo "$key=$value" >> "$GITHUB_ENV"
          }

          set_optional_var VITE_ADS_ENABLED "$RAW_VITE_ADS_ENABLED"
          set_optional_var VITE_ADS_DEBUG "$RAW_VITE_ADS_DEBUG"
          set_optional_var VITE_ADS_PROVIDER "$RAW_VITE_ADS_PROVIDER"
          set_optional_var VITE_ADSENSE_CLIENT "$RAW_VITE_ADSENSE_CLIENT"
          set_optional_var VITE_ADSENSE_HOME_SLOT "$RAW_VITE_ADSENSE_HOME_SLOT"
          set_optional_var VITE_ADSENSE_PAGE_SLOT "$RAW_VITE_ADSENSE_PAGE_SLOT"
          set_optional_var VITE_ADSENSE_CONTENT_SLOT "$RAW_VITE_ADSENSE_CONTENT_SLOT"
          set_optional_var VITE_LEAD_CTA_ENABLED "$RAW_VITE_LEAD_CTA_ENABLED"
          set_optional_var VITE_LEAD_CTA_DEBUG "$RAW_VITE_LEAD_CTA_DEBUG"
          set_optional_var VITE_LEAD_CTA_TITLE "$RAW_VITE_LEAD_CTA_TITLE"
          set_optional_var VITE_LEAD_CTA_BODY "$RAW_VITE_LEAD_CTA_BODY"
          set_optional_var VITE_LEAD_CTA_PRIMARY_LABEL "$RAW_VITE_LEAD_CTA_PRIMARY_LABEL"
          set_optional_var VITE_LEAD_CTA_PRIMARY_URL "$RAW_VITE_LEAD_CTA_PRIMARY_URL"
          set_optional_var VITE_LEAD_CTA_SECONDARY_LABEL "$RAW_VITE_LEAD_CTA_SECONDARY_LABEL"
          set_optional_var VITE_LEAD_CTA_SECONDARY_URL "$RAW_VITE_LEAD_CTA_SECONDARY_URL"

      - name: Build site
        run: npm run build

      - name: Replace legacy Pages site with root redirect
        if: github.repository != 'wonbadon/wonbadon.github.io'
        run: node ./scripts/prepare-legacy-redirect.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4